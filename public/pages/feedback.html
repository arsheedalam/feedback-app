<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="feedback-container">

    <h2>Feedback</h2>

    <div class="btn-group">
        <button id="addBtn" onclick="addFeedback()">Add Feedback</button>
        <button id="editBtn" onclick="editFeedback()">Edit Feedback</button>
    </div>

    <label>Your Feedback:</label>

    <textarea id="feedback" placeholder="Write your feedback here..." disabled></textarea>

    <button class="submit-btn" onclick="submitFeedback()">Submit</button>

</div>

<script src="../js/feedback.js"></script>

</body>
</html>
